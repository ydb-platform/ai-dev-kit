prompts:
  - "{{ user_prompt }}"

defaultTest:
  vars:
    # Generated from skills/*/SKILL.md frontmatter by
    # scripts/extract-descriptions.py — keep in sync via the validator.
    skill_descriptions: file://tests/routing/descriptions.md
  # Defensive: an upstream error sometimes lands as a plain string in
  # the response; without this guard the regex below could match the
  # word "ydb-table" buried in an error payload.
  assert:
    - type: not-contains
      value: "[provider error]"

# Routing tests are discovered from tests/routing/*.yaml.
tests:
  - file://tests/routing/*.yaml
