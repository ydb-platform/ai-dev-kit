# YDB skills routing matrix.
#
# Goal: given only the skill `description:` fields (no skill bodies),
# does the model pick the right skill for a user request? This
# approximates the runtime selector — Claude Code / Cursor / Codex each
# show installed skills' descriptions to the model and let it pick.
#
# Complementary to the main matrix:
#   promptfooconfig.yaml         — ceiling: skill bodies loaded, can the
#                                  model use them?
#   promptfooconfig.routing.yaml — selector: only descriptions, does the
#                                  right skill get picked?
#
# Usage:
#   export OPENROUTER_API_KEY="..."
#   npx promptfoo@latest eval -c promptfooconfig.routing.yaml

description: YDB skills routing matrix

_http_base: &http
  method: POST
  url: "https://openrouter.ai/api/v1/chat/completions"
  headers:
    Content-Type: application/json
    Authorization: "Bearer {{ env.OPENROUTER_API_KEY }}"
  transformResponse: json.choices[0].message.content

_messages: &messages
  - role: system
    content: |
      You are a skill router for a coding agent that works with YDB
      (open-source distributed SQL DBMS — https://ydb.tech).

      Below is the list of installed skills with their selector
      descriptions. Given a user request, decide which single skill —
      if any — should load to answer it.

      Reply with exactly one token, lowercase, no surrounding text:
        - the skill slug (e.g. `ydb-table`) if one applies,
        - `none` if the request is unrelated to YDB or to any
          installed skill.

      Do not output prose, quotes, code fences, or explanations. One
      token. Nothing else.

      ═════════════════════════════════════════════════════════════
      INSTALLED SKILLS
      ═════════════════════════════════════════════════════════════
      {{ skill_descriptions }}
  - role: user
    content: "{{ user_prompt }}"

providers:
  # ── Frontier · closed ──────────────────────────────────────────────────
  - id: https:anthropic/claude-opus-4.7
    label: Frontier · Anthropic Opus 4.7
    config:
      <<: *http
      body:
        model: "anthropic/claude-opus-4.7"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:openai/gpt-5.3-codex
    label: Frontier · OpenAI GPT-5.3 Codex
    config:
      <<: *http
      body:
        model: "openai/gpt-5.3-codex"
