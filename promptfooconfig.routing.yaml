# YDB skills routing matrix.
#
# Goal: given only the skill `description:` fields (no skill bodies),
# does the model pick the right skill for a user request? This
# approximates the runtime selector — Claude Code / Cursor / Codex each
# show installed skills' descriptions to the model and let it pick.
#
# Complementary to the main matrix:
#   promptfooconfig.yaml         — ceiling: skill bodies loaded, can the
#                                  model use them?
#   promptfooconfig.routing.yaml — selector: only descriptions, does the
#                                  right skill get picked?
#
# Usage:
#   export OPENROUTER_API_KEY="..."
#   npx promptfoo@latest eval -c promptfooconfig.routing.yaml

description: YDB skills routing matrix

# Run knobs — bump concurrency to make full-matrix runs faster.
# OpenRouter handles parallelism; the limiter is your key's monthly cap.
# CLI override: `npx promptfoo eval -j <N>`.
evaluateOptions:
  maxConcurrency: 12


_http_base: &http
  method: POST
  url: "https://openrouter.ai/api/v1/chat/completions"
  headers:
    Content-Type: application/json
    Authorization: "Bearer {{ env.OPENROUTER_API_KEY }}"
  transformResponse: json.choices[0].message.content

_messages: &messages
  - role: system
    content: |
      You are a skill router for a coding agent that works with YDB
      (open-source distributed SQL DBMS — https://ydb.tech).

      Below is the list of installed skills with their selector
      descriptions. Given a user request, decide which single skill —
      if any — should load to answer it.

      Reply with exactly one token, lowercase, no surrounding text:
        - the skill slug (e.g. `ydb-table`) if one applies,
        - `none` if the request is unrelated to YDB or to any
          installed skill.

      Do not output prose, quotes, code fences, or explanations. One
      token. Nothing else.

      ═════════════════════════════════════════════════════════════
      INSTALLED SKILLS
      ═════════════════════════════════════════════════════════════
      {{ skill_descriptions }}
  - role: user
    content: "{{ user_prompt }}"

providers:
  # ── Frontier · closed ──────────────────────────────────────────────────
  - id: https:anthropic/claude-opus-4.7
    label: Frontier · Anthropic Opus 4.7
    config:
      <<: *http
      body:
        model: "anthropic/claude-opus-4.7"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:openai/gpt-5.3-codex
    label: Frontier · OpenAI GPT-5.3 Codex
    config:
      <<: *http
      body:
        model: "openai/gpt-5.3-codex"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:google/gemini-3.1-pro-preview
    label: Frontier · Google Gemini 3.1 Pro (preview)
    config:
      <<: *http
      body:
        model: "google/gemini-3.1-pro-preview"
        messages: *messages
        temperature: 0.0
        max_tokens: 256

  # ── Frontier · open-source ─────────────────────────────────────────────
  - id: https:deepseek/deepseek-v4-pro
    label: Frontier OSS · DeepSeek v4-Pro
    config:
      <<: *http
      body:
        model: "deepseek/deepseek-v4-pro"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:moonshotai/kimi-k2.6
    label: Frontier OSS · Moonshot Kimi K2.6
    config:
      <<: *http
      body:
        model: "moonshotai/kimi-k2.6"
        reasoning: { enabled: false }
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:qwen/qwen3.6-plus
    label: Frontier OSS · Qwen3.6 Plus
    config:
      <<: *http
      body:
        model: "qwen/qwen3.6-plus"
        messages: *messages
        temperature: 0.0
        max_tokens: 256

  # ── Laptop · Ollama-runnable ───────────────────────────────────────────
  - id: https:openai/gpt-oss-20b
    label: Laptop · OpenAI gpt-oss-20b
    config:
      <<: *http
      body:
        model: "openai/gpt-oss-20b"
        messages: *messages
        temperature: 0.0
        # Reasoning model — same fix as Qwen3.6 35B-A3B below and the
        # main matrix: 256 gets eaten by the thinking budget and the
        # visible slug comes back empty. 8192 leaves headroom.
        max_tokens: 8192
  - id: https:mistralai/devstral-small
    label: Laptop · Mistral Devstral Small
    config:
      <<: *http
      body:
        model: "mistralai/devstral-small"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:qwen/qwen3.6-35b-a3b
    label: Laptop · Qwen3.6 35B-A3B
    config:
      <<: *http
      body:
        model: "qwen/qwen3.6-35b-a3b"
        messages: *messages
        temperature: 0.0
        # Reasoning model — needs headroom for thinking even though the
        # final answer is one token. 8192 mirrors the main matrix.
        max_tokens: 8192

prompts:
  - "{{ user_prompt }}"

defaultTest:
  vars:
    # Generated from skills/*/SKILL.md frontmatter by
    # scripts/extract-descriptions.py — keep in sync via the validator.
    skill_descriptions: file://tests/routing/descriptions.md
  # Defensive: an upstream error sometimes lands as a plain string in
  # the response; without this guard the regex below could match the
  # word "ydb-table" buried in an error payload.
  assert:
    - type: not-contains
      value: "[provider error]"

# Routing tests are discovered from tests/routing/*.yaml.
tests:
  - file://tests/routing/*.yaml
