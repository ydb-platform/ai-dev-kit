    config:
      <<: *http
      body:
        model: "qwen/qwen3-coder-30b-a3b-instruct"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:qwen/qwen-2.5-coder-32b-instruct
    label: Qwen 2.5 Coder 32B (widely-deployed legacy)
    config:
      <<: *http
      body:
        model: "qwen/qwen-2.5-coder-32b-instruct"
        messages: *messages
        temperature: 0.0
        max_tokens: 256
  - id: https:deepseek/deepseek-v3.2
    label: DeepSeek v3.2
    config:
      <<: *http
      body:
        model: "deepseek/deepseek-v3.2"
        messages: *messages
