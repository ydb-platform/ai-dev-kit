description: Routing · Setup / connection question → ydb-core

vars:
  user_prompt: |
    I need to connect to a hosted YDB cluster from a Go service.
    What connection string format does YDB use and which env vars
    do I set for service-account auth?

assert:
  - type: regex
    value: \bydb-core\b
  - type: not-regex
    value: \bydb-table\b
  - type: not-regex
    value: \bnone\b
