description: Routing · YQL writing → ydb-table

vars:
  user_prompt: |
    Write a YQL query to paginate a `users` table by
    `created_at` (Timestamp) and `id` (Uint64), 50 rows per page.

assert:
  - type: regex
    value: \bydb-table\b
  - type: not-regex
    value: \bydb-core\b
  - type: not-regex
    value: \bnone\b
