description: Routing · Schema / primary-key design → ydb-table

vars:
  user_prompt: |
    Design a primary key for an IoT events table in YDB. Devices
    emit telemetry every second; we'll have ~50M rows/day and
    query mostly by device_id + recent time range.

assert:
  - type: regex
    value: \bydb-table\b
  - type: not-regex
    value: \bydb-core\b
  - type: not-regex
    value: \bnone\b
