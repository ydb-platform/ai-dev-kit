description: Routing · Go ydb-go-sdk/v3 audit → ydb-table

vars:
  user_prompt: |
    Review this Go SDK code that runs an OLTP transfer through YDB.
    Anything wrong with the retry / transaction shape?

    ```go
    err := db.Query().DoTx(ctx, func(ctx context.Context, tx query.TxActor) error {
        _, err := tx.Exec(ctx,
            "UPDATE accounts SET balance = balance - $amt WHERE id = $from",
            query.WithParameters(ydb.ParamsBuilder().
                Param("$from").Uint64(fromID).
                Param("$amt").Int64(amount).Build()),
        )
        if err != nil { return err }
        return tx.CommitTx(ctx)
    }, query.WithIdempotent())
    ```

assert:
  - type: regex
    value: \bydb-table\b
  - type: not-regex
    value: \bydb-core\b
  - type: not-regex
    value: \bnone\b
