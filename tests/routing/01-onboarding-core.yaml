description: Routing · Onboarding question → ydb-core

vars:
  user_prompt: |
    I've never used YDB before. Can you give me a 3-minute intro —
    what it is, what problems it solves, and how it differs from
    PostgreSQL?

assert:
  - type: regex
    value: \bydb-core\b
  - type: not-regex
    value: \bydb-table\b
  - type: not-regex
    value: \bnone\b
