description: Routing · PostgreSQL → YDB conversion → ydb-table

vars:
  user_prompt: |
    I'm porting this PostgreSQL table to YDB. The `id SERIAL PRIMARY KEY`
    column is the main issue — what's the YDB equivalent and how do
    I keep IDs unique?

    ```sql
    CREATE TABLE orders (
        id SERIAL PRIMARY KEY,
        customer_id BIGINT NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT NOW()
    );
    ```

assert:
  - type: regex
    value: \bydb-table\b
  - type: not-regex
    value: \bydb-core\b
  - type: not-regex
    value: \bnone\b
