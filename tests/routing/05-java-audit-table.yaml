description: Routing · Java/Spring/Hibernate audit → ydb-table

vars:
  user_prompt: |
    Review this Spring Data JPA code that writes events to YDB.
    Is there anything wrong with the bulk-write pattern?

    ```java
    @Transactional
    public void saveAll(List<Event> events) {
        for (Event e : events) {
            repository.save(e);
        }
    }
    ```

assert:
  - type: regex
    value: \bydb-table\b
  - type: not-regex
    value: \bydb-core\b
  - type: not-regex
    value: \bnone\b
