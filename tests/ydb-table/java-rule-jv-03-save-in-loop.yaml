description: Java audit · Spring save() in a loop (RULE-JV-03)

vars:
  user_prompt: |
    Spring Boot service that imports users into YDB. Review the write path:

    ```java
    @Transactional
    public void importUsers(List<UserDto> input) {
        for (UserDto u : input) {
            User entity = new User(u.id(), u.name(), u.email());
            repository.save(entity);
        }
    }
    ```

    Assume `hibernate.jdbc.batch_size=1000` is already configured.

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-JV-03` by ID (Spring save() in a loop).
      - Recommend collecting the entities into a `List` and calling `repository.saveAll(batch)` once at the end.
      - Either explain that per-entity save() defeats Hibernate batching even when batch_size is set, OR explain that one statement beats N statements.
      - Not claim the loop is fine "because batch_size is configured" — that's exactly the misconception the rule corrects.

      Full fail if the response approves the loop because batch_size is set.
