description: Java audit · JPA @Version over YDB (RULE-JV-05)

vars:
  user_prompt: |
    Review this JPA entity. We're using YDB via the JDBC driver and Hibernate.
    Production sees a lot of UPDATE traffic on this table.

    ```java
    @Entity
    public class Account {
        @Id private Long id;
        private BigDecimal balance;
        @Version private Long version;
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-JV-05` by ID (JPA @Version over YDB).
      - Recommend removing the `@Version` field.
      - Explain why: YDB Query Service runs `SerializableRW` by default, so the server already detects update conflicts and surfaces them as a retryable error — the `@Version` predicate is redundant and adds work to every UPDATE.
      - Point to retry-based handling of conflicts (the response may reference RULE-JV-06 by ID, the SDK retry helpers, or `SQLRecoverableException` — any of these is acceptable).
      - Not recommend `@Version` as a defensive measure or claim it provides additional safety on YDB.

      Full fail if the response approves keeping `@Version` "for safety" or invents a different rule ID.
