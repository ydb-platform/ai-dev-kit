description: Go audit · Reading all matching rows through Table Service (RULE-GO-01)

vars:
  user_prompt: |
    Review this Go function that runs in our billing pipeline once a day.
    It reads all unbilled usage items and charges the customer for each.
    Tell me if anything is wrong.

    ```go
    func chargeUnbilled(ctx context.Context, db *ydb.Driver) error {
        return db.Table().Do(ctx, func(ctx context.Context, s table.Session) error {
            _, res, err := s.Execute(ctx, table.DefaultTxControl(),
                `SELECT user_id, amount FROM usage_items WHERE billed = false`, nil)
            if err != nil {
                return err
            }
            defer res.Close()
            for res.NextResultSet(ctx) {
                for res.NextRow() {
                    var userID uint64
                    var amount float64
                    if err := res.ScanWithDefaults(&userID, &amount); err != nil {
                        return err
                    }
                    chargeCustomer(ctx, userID, amount)
                }
            }
            return res.Err()
        }, table.WithIdempotent())
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-01` by ID (Table Service read without pagination).
      - State that Table Service caps query results at 1000 rows by default
        (server-side, silent — the call returns without an exception while
        the underlying query matched more rows).
      - Explain the consequence specifically in the billing context: while
        the count of unbilled items stays under 1000 the function works,
        but once it crosses 1000 the function silently under-charges and
        the discrepancy compounds. The bug is data-dependent and not
        catchable by tests on a small dev dataset.
      - Recommend redesigning the read to exhaust the result set —
        keyset pagination (`WHERE user_id > $lastID ORDER BY user_id LIMIT N`
        wrapped in an outer loop that terminates when a page comes back
        empty) or the Query Service streaming path. The fix is structural,
        not a knob.
      - Not invent a different RULE-GO-XX ID that isn't in the loaded rules
        file.

      Full fail if the response:
      - Only suggests adding an explicit `LIMIT` clause without an outer
        pagination loop.
      - Recommends raising / configuring away the 1000-row cap.
      - Treats the issue as performance / memory rather than as a silent
        correctness bug.
      - Defends the code as correct on the grounds that "Table Service
        works fine for SELECT queries".
