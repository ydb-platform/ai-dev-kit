description: Query · Converting PostgreSQL SERIAL to YQL

vars:
  user_prompt: |
    I'm porting a PostgreSQL schema to YDB. The original table uses
    `id SERIAL PRIMARY KEY`. What's the YQL equivalent?

assert:
  - type: llm-rubric
    value: |
      The response should:
      - State plainly that YDB has no SERIAL / AUTO_INCREMENT equivalent —
        sequences are not a built-in YDB feature (grounded in the ydb-table
        skill's sql-to-yql guidance).
      - Recommend either a client-generated UUID (e.g. Utf8 stored as
        `String` or as `Uuid`) or a hash-prefix + id-service design.
      - Warn that simply using a monotonically increasing integer as the sole
        PK column recreates the hot-partition problem.
      - Not invent a YDB `AUTO_INCREMENT` or `SEQUENCE` keyword — neither
        exists.

      Full fail if the response suggests `AUTO_INCREMENT`, `SERIAL`, or
      `CREATE SEQUENCE` in YQL.
