description: Go audit · Missing WithIdempotent on Do (RULE-GO-03)

vars:
  user_prompt: |
    Review this Go function. It writes an event into YDB; `e.ID` is
    generated client-side and is unique per event (we deduplicate
    upstream by this id). We've seen sporadic errors during cluster
    upgrades that surface to the caller — but when we re-check the
    table after the failure, the event is actually there. Is the SDK
    call correct?

    ```go
    func recordEvent(ctx context.Context, db *ydb.Driver, e Event) error {
        return db.Query().Do(ctx, func(ctx context.Context, s query.Session) error {
            _, err := s.Query(ctx,
                `DECLARE $id AS Uint64;
                 DECLARE $payload AS String;
                 UPSERT INTO events (id, payload) VALUES ($id, $payload)`,
                query.WithParameters(ydb.ParamsBuilder().
                    Param("$id").Uint64(e.ID).
                    Param("$payload").Bytes(e.Payload).Build()),
            )
            return err
        })
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-03` by ID (missing WithIdempotent).
      - Identify that the `db.Query().Do(...)` call has no
        `query.WithIdempotent()` option.
      - Explain the conditional-retry semantics: without the flag, the
        SDK does not retry conditionally-retryable failures — the
        transport-class errors where the server may have already
        committed the write before the client saw the failure.
      - Connect this directly to the user's reported symptom: the
        write is observed to have succeeded server-side after the
        error, which is the exact "committed before the client saw
        the failure" pattern. Adding the flag would let the SDK
        replay the closure and return success.
      - Explain WHY it is safe to set the flag for THIS specific
        write: the `UPSERT` is keyed on an externally-generated `id`,
        so a replay either UPSERTs the same row again (no-op
        semantically) or completes the original write. The rule is
        about declaring the write idempotent, not about retrying
        SELECTs.
      - Recommend adding `query.WithIdempotent()` as the last
        argument to `Do`.
      - Not invent a different RULE-GO-XX ID that isn't in the loaded
        rules file.

      Full fail if the response:
      - Says the code is fine.
      - Recommends wrapping `Do` in an outer manual retry loop
        instead of using the flag.
      - Suggests `WithIdempotent` should be set on every `Do` call
        unconditionally regardless of inner semantics.
      - Frames the rule around `SELECT` safety (the test snippet is
        an UPSERT, and SELECTs are not where this rule earns its
        keep — the design tension is around writes that *might* have
        committed before failure surfaced).
