description: Go audit · PreferLocalDC / PreferNearestDC balancer (RULE-GO-08)

vars:
  user_prompt: |
    Review this Go driver initialization. We're seeing higher latency
    than expected on a multi-DC YDB cluster. The team set the balancer
    to prefer the local DC to reduce cross-DC RTT. Is this the right
    choice for production?

    ```go
    db, err := ydb.Open(ctx,
        "grpcs://ydb.example.internal:2135/?database=/prod/main",
        ydb.WithBalancer(balancers.PreferLocalDC(balancers.RandomChoice())),
        ydb.WithCredentials(...),
    )
    if err != nil { return nil, err }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-08` by ID (PreferLocalDC / PreferNearestDC in
        production).
      - Explain that prefer-DC balancers concentrate ALL client traffic
        on nodes in one datacenter — the chosen DC saturates while the
        other DC's nodes sit idle as hot-standbys. The cross-DC RTT
        savings on individual requests are dwarfed by the throughput
        cliff once the chosen DC saturates.
      - Identify that `balancers.PreferLocalDC` is also marked
        `// Deprecated` upstream — `PreferNearestDC` is the current
        name with identical balancing behavior; both should be avoided
        in production.
      - Recommend `balancers.RandomChoice()` (the default) which
        spreads load evenly across all DCs — what the cluster topology
        is designed for.

      Full fail if the response endorses the prefer-DC choice as a
      latency optimization or suggests using `PreferNearestDC` as a
      replacement for `PreferLocalDC`.
