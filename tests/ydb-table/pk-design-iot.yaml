description: Query · Primary-key design for IoT events (monotonic-PK trap)

vars:
  user_prompt: |
    I'm designing a YDB table for IoT events. Each event has a Uint64
    event_id assigned by our id-service and the payload. Expected throughput
    is 50k inserts/sec. What should my primary key and partitioning look like?

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Explicitly warn that a monotonically increasing `event_id` as a
        single-column PK creates a hot last partition (writes concentrate on
        one tablet and one CPU core).
      - Recommend a composite PK with a hash prefix, typically:
        `PRIMARY KEY (hash, event_id)` where `hash = Digest::NumericHash(event_id)`
        or similar. The first PK column must scatter writes.
      - Enable `AUTO_PARTITIONING_BY_LOAD` and set a sensible
        `AUTO_PARTITIONING_MIN_PARTITIONS_COUNT` (≥ 4, matching node count).
      - Mention `AUTO_PARTITIONING_MAX_PARTITIONS_COUNT` as an upper bound to
        prevent runaway splitting.

      Full fail if the recommended PK is just `(event_id)` with no hash prefix.
      Full fail if the response does not mention all three of
      `AUTO_PARTITIONING_BY_LOAD`, `AUTO_PARTITIONING_MIN_PARTITIONS_COUNT`,
      and `AUTO_PARTITIONING_MAX_PARTITIONS_COUNT` — those are the YDB-specific
      knobs the skill teaches; an answer that recommends a composite PK
      with a hash prefix but stops there is generic database advice, not
      a YDB-grounded answer.
