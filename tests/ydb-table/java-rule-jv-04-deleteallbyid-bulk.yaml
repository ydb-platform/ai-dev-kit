description: Java audit · deleteAllById on bulk path (RULE-JV-04)

vars:
  user_prompt: |
    Code that purges expired tokens from YDB. Anything off here?

    ```java
    @Transactional
    public void purgeExpired(List<Long> ids) {
        repository.deleteAllById(ids);
    }
    ```

    The repository extends `JpaRepository<Token, Long>`. `ids` is typically a few thousand items.

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-JV-04` by ID (deleteAllById on a bulk path).
      - Recommend switching to `repository.deleteAllByIdInBatch(ids)`.
      - Explain that Spring Data's `deleteAllById` loads each entity via `findById` before deleting (N SELECT + N DELETE), while `deleteAllByIdInBatch` emits a single `DELETE … WHERE id IN (…)`.
      - Not confuse `deleteAllById` with `deleteAll` (the former takes ids, the latter takes entities).

      Full fail if the response says `deleteAllById` is the correct bulk method, or recommends a loop instead.
