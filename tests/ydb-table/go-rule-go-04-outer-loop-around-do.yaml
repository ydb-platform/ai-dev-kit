description: Go audit · for-loop wrapping Do (RULE-GO-04)

vars:
  user_prompt: |
    Review this Go code. We noticed transient errors during cluster
    upgrades and added a retry wrapper around the YDB call. Anything
    wrong with this approach?

    ```go
    func loadUser(ctx context.Context, db *ydb.Driver, id uint64) (User, error) {
        var u User
        var lastErr error
        for attempt := 0; attempt < 5; attempt++ {
            err := db.Query().Do(ctx, func(ctx context.Context, s query.Session) error {
                res, err := s.Query(ctx,
                    `DECLARE $id AS Uint64;
                     SELECT id, name FROM users WHERE id = $id`,
                    query.WithParameters(ydb.ParamsBuilder().
                        Param("$id").Uint64(id).Build()),
                )
                if err != nil { return err }
                defer res.Close(ctx)
                // scan into u
                return nil
            }, query.WithIdempotent())
            if err == nil { return u, nil }
            lastErr = err
            time.Sleep(time.Duration(attempt+1) * 100 * time.Millisecond)
        }
        return u, lastErr
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-04` by ID (outer for-loop wrapping Do).
      - Explain that `db.Query().Do(...)` already implements the retry
        loop internally — it classifies errors, applies backoff, and
        replays the closure on retryable failures. The outer for-loop
        is redundant retry on top of retry.
      - Explain the harm: the outer loop will re-run work that the
        SDK has already correctly decided is non-retryable, multiplying
        wait time and possibly side effects. It also breaks the SDK's
        retry-budget accounting.
      - Recommend deleting the outer for-loop and relying on Do's
        built-in retry. If the goal is to extend the retry budget for
        a specific error class, that's done via retry options, not by
        wrapping.

      Full fail if the response defends the outer for-loop as
      "extra safety" or "defense in depth".
