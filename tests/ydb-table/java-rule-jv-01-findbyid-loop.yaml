description: Java audit · findById in a loop (RULE-JV-01)

vars:
  user_prompt: |
    Review this Spring Data JPA code that reads tokens from YDB and tell
    me if it has any anti-patterns. The repository extends `JpaRepository`.

    ```java
    public List<Token> loadTokens(List<Long> ids) {
        List<Token> result = new ArrayList<>();
        for (Long id : ids) {
            result.add(repository.findById(id).orElseThrow());
        }
        return result;
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-JV-01` by ID (the rule about findById in a loop).
      - Recommend replacing the loop with `repository.findAllById(ids)`.
      - Explain that the loop issues one SELECT per id (N round trips) where one statement would do.
      - Not invent a different RULE-JV-XX ID that isn't in the loaded rules file.

      Full fail if the response defends the loop as correct or invents a different rule ID.
