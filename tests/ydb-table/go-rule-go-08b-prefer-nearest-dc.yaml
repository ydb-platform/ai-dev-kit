description: Go audit · PreferNearestDC balancer (RULE-GO-08, current API name)

vars:
  user_prompt: |
    Review this Go driver initialization for a multi-DC YDB cluster.
    The team picked the "nearest DC" balancer to keep request latency
    low. Is this safe for production traffic?

    ```go
    db, err := ydb.Open(ctx,
        "grpcs://ydb.example.internal:2135/?database=/prod/main",
        ydb.WithBalancer(balancers.PreferNearestDC(balancers.RandomChoice())),
        ydb.WithCredentials(...),
    )
    if err != nil { return nil, err }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-08` by ID.
      - Explain that prefer-DC balancers concentrate ALL client traffic
        on nodes in one datacenter — the chosen DC saturates while the
        other DC's nodes sit idle as hot-standbys. The cross-DC RTT
        savings on individual requests are dwarfed by the throughput
        cliff once the chosen DC saturates.
      - Recommend dropping `WithBalancer(...)` (or passing
        `balancers.RandomChoice()` explicitly — that's what
        `balancers.Default()` returns). RandomChoice spreads load
        evenly across every available node in the cluster.

      Full fail if the response endorses `PreferNearestDC` because it
      is "the non-deprecated version of PreferLocalDC", or treats the
      issue as solvable by switching balancer names rather than
      removing the prefer-DC pattern entirely.
