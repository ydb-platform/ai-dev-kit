description: Go audit · Non-interactive DoTx auto-commit without `query.WithCommit()` (RULE-GO-10)

vars:
  user_prompt: |
    Review this Go transaction code. OLTP path, ~10k req/s. We already
    enabled lazy transactions on the driver (`ydb.WithLazyTx(true)`).
    Any further round-trip tuning we can do?

    ```go
    err := db.Query().DoTx(ctx, func(ctx context.Context, tx query.TxActor) error {
        if _, err := tx.Exec(ctx,
            "UPDATE orders SET status = 'paid' WHERE id = $id",
            query.WithParameters(ydb.ParamsBuilder().
                Param("$id").Uint64(orderID).Build()),
        ); err != nil {
            return err
        }
        _, err := tx.Exec(ctx,
            "INSERT INTO payments (order_id, txn_id, amount) VALUES ($oid, $txn, $amt)",
            query.WithParameters(ydb.ParamsBuilder().
                Param("$oid").Uint64(orderID).
                Param("$txn").Text(txnID).
                Param("$amt").Int64(amount).Build()),
        )
        return err
    })
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-10` by ID.
      - Identify this as a non-interactive transaction
        (`db.Query().DoTx`) where the closure returns `nil` after the
        last write. Per the upstream `query/client.go` `DoTx` godoc,
        DoTx commits on return-nil — but as a separate RPC because
        the last `tx.Exec` does not carry `query.WithCommit()`.
      - Recommend passing `query.WithCommit()` as an `ExecuteOption`
        to the last `tx.Exec(...)` so the commit rides on that
        write's RPC instead of being its own RPC. With LazyTx already
        on, the transaction goes from begin+write1+write2+commit = 3
        post-LazyTx RPCs (write1, write2, commit) down to 2 (write1,
        write2-with-commit).
      - Be clear that this is the same RULE-GO-10 anti-pattern as the
        explicit `tx.CommitTx` case — the auto-commit DoTx does is
        still a standalone RPC unless the last write fuses it via
        `query.WithCommit()`.

      Full fail if the response:
      - Claims `DoTx` already commits without an extra round-trip
        purely from return-nil (it commits, but as a separate RPC
        unless `query.WithCommit()` is set).
      - Recommends adding an explicit `tx.CommitTx(ctx)` (that's the
        RULE-GO-10 doubly-wrong case).
      - Defends the code as already optimal because `WithLazyTx` is
        set.
