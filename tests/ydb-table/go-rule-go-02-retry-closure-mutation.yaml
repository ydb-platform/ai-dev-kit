description: Go audit · External state mutation from Do retry closure (RULE-GO-02)

vars:
  user_prompt: |
    Review this Go function. It collects active orders for a periodic
    report. Anything wrong with how it accumulates the result?

    ```go
    func collectActiveOrders(ctx context.Context, db *ydb.Driver) ([]Order, error) {
        var orders []Order
        err := db.Query().Do(ctx, func(ctx context.Context, s query.Session) error {
            res, err := s.Query(ctx, `SELECT id, customer_id, total FROM orders WHERE status = 'active'`)
            if err != nil {
                return err
            }
            defer res.Close(ctx)
            for rs, err := range res.ResultSets(ctx) {
                if err != nil { return err }
                for row, err := range rs.Rows(ctx) {
                    if err != nil { return err }
                    var o Order
                    if err := row.Scan(&o.ID, &o.CustomerID, &o.Total); err != nil {
                        return err
                    }
                    orders = append(orders, o)
                }
            }
            return nil
        }, query.WithIdempotent())
        if err != nil {
            return nil, err
        }
        return orders, nil
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-02` by ID (external state mutation from inside Do
        retry closure).
      - Explain that the `Do` closure is the unit of work — the SDK
        re-invokes it on retryable errors (transaction conflict,
        network transient, session loss). The closure is NOT a
        one-shot function.
      - Identify the specific failure: `orders = append(orders, o)`
        mutates the outer slice on every attempt, so on retry the
        accumulator carries entries from the previous failed attempt
        plus the current attempt — duplicate rows in the final result.
      - Recommend the structural fix: build a per-attempt local slice
        inside the closure, and assign it to the outer variable only
        at the end of the closure (on the path that returns `nil`).
        The closure must own all data processing; only the success
        decision crosses the boundary.
      - Not invent a different RULE-GO-XX ID that isn't in the loaded
        rules file.

      Full fail if the response:
      - Defends the code as correct on the grounds that "the closure
        only runs once on success" (it may run many times).
      - Suggests adding a `orders = nil` reset at the *start* of the
        closure as the fix — that masks the symptom but still violates
        the contract that data is built inside and committed at the
        end.
      - Misses the retry-closure semantics entirely and only comments
        on the SQL or the scan code.
