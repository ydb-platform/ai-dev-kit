description: Go audit · Separate Commit after last query (RULE-GO-10)

vars:
  user_prompt: |
    Review this Go transaction code. OLTP path, ~10k req/s. Any
    round-trip tuning possible here?

    ```go
    err := db.Query().DoTx(ctx, func(ctx context.Context, tx query.TxActor) error {
        _, err := tx.Exec(ctx,
            `DECLARE $from AS Uint64; DECLARE $amt AS Int64;
             UPDATE accounts SET balance = balance - $amt WHERE id = $from`,
            query.WithParameters(ydb.ParamsBuilder().
                Param("$from").Uint64(fromID).
                Param("$amt").Int64(amount).Build()),
        )
        if err != nil { return err }
        _, err = tx.Exec(ctx,
            `DECLARE $to AS Uint64; DECLARE $amt AS Int64;
             UPDATE accounts SET balance = balance + $amt WHERE id = $to`,
            query.WithParameters(ydb.ParamsBuilder().
                Param("$to").Uint64(toID).
                Param("$amt").Int64(amount).Build()),
        )
        if err != nil { return err }
        return tx.CommitTx(ctx)
    }, query.WithIdempotent())
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-10` by ID.
      - Identify that this is a non-interactive transaction
        (`db.Query().DoTx(...)`) and explain that `DoTx` already
        commits the transaction when the closure returns `nil`.
      - Identify the explicit `tx.CommitTx(ctx)` at the end of the
        closure as **doubly wrong**: redundant with DoTx's auto-commit
        AND a separate commit RPC.
      - Recommend the structural fix: delete the explicit `CommitTx`
        AND pass `query.WithCommit()` as an option to the last
        `tx.Exec(...)`. The commit then rides on the last write's
        RPC — zero extra round-trips for commit (vs. one extra with
        DoTx auto-commit, vs. one extra with the original explicit
        CommitTx).

      Full fail if the response:
      - Only recommends removing the explicit `CommitTx` without
        naming `query.WithCommit()` as the optimal fix.
      - Defends the explicit `CommitTx` as necessary.
      - Misses that DoTx auto-commits on return-nil.
