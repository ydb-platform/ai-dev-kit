description: Java audit · ignoring retryable JDBC exceptions (RULE-JV-06)

vars:
  user_prompt: |
    Review this method that writes a token into YDB through plain JDBC.

    ```java
    public void writeToken(Token t) {
        try {
            jdbcTemplate.update(
                "UPSERT INTO tokens (id, payload) VALUES (?, ?)",
                t.id(), t.payload());
        } catch (SQLException e) {
            log.warn("save failed", e);
        }
    }
    ```

    This is a non-idempotent path in some call sites, idempotent in others — callers vary.

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-JV-06` by ID (ignoring retryable JDBC exceptions).
      - Recommend classifying the caught exception rather than swallowing the bare `SQLException`.
      - Distinguish between the two retry buckets the ydb-jdbc-driver throws: `SQLRecoverableException` (always safe to retry — e.g. `ABORTED` / `Transaction locks invalidated`) versus `SQLTransientException` (retry only for idempotent operations — the server may have committed before the failure surfaced).
      - Mention that retrying `SQLTransientException` for non-idempotent operations risks double effect.
      - Not recommend a blanket "retry everything on SQLException" that ignores the idempotency distinction.

      Full fail if the response recommends catching SQLException and retrying unconditionally, or claims that connection drops are always safe to retry.
