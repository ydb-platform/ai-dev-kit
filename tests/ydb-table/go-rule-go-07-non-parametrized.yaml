description: Go audit · Non-parametrized YQL via fmt.Sprintf (RULE-GO-07)

vars:
  user_prompt: |
    Review this Go function. It builds a search query for an admin
    panel. Any issues?

    ```go
    func searchUsers(ctx context.Context, db *ydb.Driver, namePrefix string, minAge int) ([]User, error) {
        var users []User
        sql := fmt.Sprintf(
            "SELECT id, name, age FROM users WHERE name LIKE '%s%%' AND age >= %d ORDER BY id LIMIT 100",
            namePrefix, minAge,
        )
        err := db.Query().Do(ctx, func(ctx context.Context, s query.Session) error {
            res, err := s.Query(ctx, sql)
            if err != nil { return err }
            defer res.Close(ctx)
            // scan rows into users
            return nil
        }, query.WithIdempotent())
        return users, err
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-07` by ID (non-parametrized YQL).
      - Identify the `fmt.Sprintf` building the query text with the
        caller-controlled `namePrefix` and `minAge` values inlined.
      - Explain at least two failure modes: (a) SQL injection — a
        caller can put YQL syntax into `namePrefix` to break out of
        the string literal and add their own predicates; and (b)
        plan-cache miss — the server keeps a plan keyed by the query
        text; with values inlined, every distinct call produces a new
        text and a new plan compilation.
      - Recommend binding the values via
        `ydb.ParamsBuilder().Param("$namePrefix").Text(namePrefix).
        Param("$minAge").Int32(minAge).Build()` passed to
        `query.WithParameters(...)`. A leading `DECLARE` block is
        optional in modern YDB (types are inferred from the bound
        values) and is fine to mention as an explicit-contract addition
        but not required.

      Full fail if the response only mentions SQL injection without
      naming the plan-cache consequence, or only mentions plan caching
      without naming SQL injection, or if it requires a `DECLARE` block
      as part of the fix.
