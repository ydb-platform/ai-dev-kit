description: Query · Keyset pagination — SQL + Go

vars:
  user_prompt: |
    Write a query and the Go code to paginate a `users` table in YDB by
    `created_at` (Timestamp) and `id` (Uint64) — 50 rows per page. Assume
    `ydb-go-sdk/v3` is already initialized as `db`.

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Use keyset pagination: `WHERE (created_at, id) > ($last_created_at, $last_id)`
        (or equivalent tuple comparison). Avoid `OFFSET` — OFFSET scans a hot
        prefix and is an anti-pattern in YDB.
      - Declare parameters (`DECLARE $last_created_at AS Timestamp;`
        `DECLARE $last_id AS Uint64;` `DECLARE $page_size AS Uint64;`) at the
        top of the query. Raw string interpolation is a failure.
      - Include `ORDER BY created_at, id` and `LIMIT $page_size`.
      - In the Go code, wrap the query in the session/retry wrapper
        (`db.Query().Do(ctx, func(...) ...)` or the table-service equivalent),
        not a bare direct call without retry.

      Partial credit if keyset pagination is correct but Go wrapper is missing.
      Full fail if `OFFSET` is used.
