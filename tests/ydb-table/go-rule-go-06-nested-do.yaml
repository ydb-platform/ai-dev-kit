description: Go audit · Nested Do call (RULE-GO-06)

vars:
  user_prompt: |
    Review this Go code. The outer Do loads a user; the inner helper
    `loadOrdersFor` reads their orders. Is this composition correct?

    ```go
    func loadUserWithOrders(ctx context.Context, db *ydb.Driver, id uint64) (User, []Order, error) {
        var u User
        var orders []Order
        err := db.Query().Do(ctx, func(ctx context.Context, s query.Session) error {
            res, err := s.Query(ctx,
                `DECLARE $id AS Uint64;
                 SELECT id, name FROM users WHERE id = $id`,
                query.WithParameters(ydb.ParamsBuilder().Param("$id").Uint64(id).Build()),
            )
            if err != nil { return err }
            defer res.Close(ctx)
            // scan u

            orders, err = loadOrdersFor(ctx, db, u.ID)
            return err
        }, query.WithIdempotent())
        return u, orders, err
    }

    func loadOrdersFor(ctx context.Context, db *ydb.Driver, userID uint64) ([]Order, error) {
        var os []Order
        err := db.Query().Do(ctx, func(ctx context.Context, s query.Session) error {
            // s.Query(...) reads orders WHERE user_id = $userID
            return nil
        }, query.WithIdempotent())
        return os, err
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-06` by ID (nested Do call).
      - Identify the nesting: `loadOrdersFor` calls `db.Query().Do(...)`
        from inside the outer `Do` lambda, opening a second retry scope
        with an independent session checkout from the pool.
      - Explain at least one of the concrete harms:
        (a) the inner Do races for a pool slot, starving the caller
        under load, or (b) on retry the inner and outer scopes retry
        independently, multiplying attempts combinatorially, or
        (c) the inner Do's own retries replay work that the outer Do
        was about to abandon.
      - Recommend restructuring `loadOrdersFor` to take a
        `query.Session` parameter and use the passed session directly
        — sharing the outer Do's session instead of opening a new one.

      Full fail if the response defends the nesting as "modular" or
      "good encapsulation".
