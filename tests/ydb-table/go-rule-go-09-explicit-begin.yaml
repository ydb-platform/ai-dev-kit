description: Go audit · Explicit BeginTransaction before first query (RULE-GO-09)

vars:
  user_prompt: |
    Review this Go transaction code. High-frequency OLTP path,
    ~10k req/s. Any round-trip tuning?

    ```go
    func transferFunds(ctx context.Context, db *ydb.Driver, fromID, toID uint64, amount int64) error {
        return db.Table().Do(ctx, func(ctx context.Context, s table.Session) error {
            tx, err := s.BeginTransaction(ctx, table.TxSettings(table.WithSerializableReadWrite()))
            if err != nil { return err }
            _, err = tx.Execute(ctx,
                `DECLARE $from AS Uint64; DECLARE $amt AS Int64;
                 UPDATE accounts SET balance = balance - $amt WHERE id = $from`,
                table.NewQueryParameters(
                    table.ValueParam("$from", types.Uint64Value(fromID)),
                    table.ValueParam("$amt", types.Int64Value(amount)),
                ),
            )
            if err != nil { return err }
            _, err = tx.Execute(ctx,
                `DECLARE $to AS Uint64; DECLARE $amt AS Int64;
                 UPDATE accounts SET balance = balance + $amt WHERE id = $to`,
                table.NewQueryParameters(
                    table.ValueParam("$to", types.Uint64Value(toID)),
                    table.ValueParam("$amt", types.Int64Value(amount)),
                ),
            )
            if err != nil { return err }
            _, err = tx.CommitTx(ctx)
            return err
        })
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-09` by ID.
      - Identify this as an interactive transaction (developer-written
        `s.BeginTransaction(...)` + `tx.Execute(...)` + `tx.CommitTx`)
        and call out the explicit `BeginTransaction` as a separate
        RPC before the first write.
      - Recommend one of two precise fixes — both valid in this code
        path:
        (a) Stay on Table Service interactive: replace the explicit
        `BeginTransaction` with the first `s.Execute(...)` carrying
        `table.WithTxControl(table.BeginTx(table.WithSerializableReadWrite()), ...)`
        so begin rides on the first query's RPC, OR
        (b) Migrate to non-interactive: rewrite using
        `db.Query().DoTx(ctx, func(ctx, tx query.TxActor) error { ... })`
        with the driver opened using `ydb.WithLazyTx(true)` so the
        begin is deferred to the first query inside the closure.
      - Make clear that the gain is one fewer round-trip per
        transaction.

      Full fail if the response:
      - Defends the explicit `BeginTransaction` as needed.
      - Only flags the separate `CommitTx` issue (that's RULE-GO-10)
        without addressing the explicit Begin.
      - Recommends only "use DoTx" without noting that DoTx's begin
        ride on the first query requires the `ydb.WithLazyTx(true)`
        option on the driver.
