description: Go audit · Non-interactive DoTx without `ydb.WithLazyTx(true)` (RULE-GO-09)

vars:
  user_prompt: |
    Review this Go transaction code. OLTP path, ~10k req/s. The driver
    is opened with the defaults we use everywhere else. Any tuning we
    can do on this hot path?

    ```go
    db, err := ydb.Open(ctx,
        "grpcs://ydb.example.internal:2135/?database=/prod/main",
        ydb.WithCredentials(...),
    )
    if err != nil { return err }
    defer db.Close(ctx)

    // ... later, on every request:
    err = db.Query().DoTx(ctx, func(ctx context.Context, tx query.TxActor) error {
        if _, err := tx.Exec(ctx,
            "UPDATE inventory SET qty = qty - $n WHERE sku = $sku",
            query.WithParameters(ydb.ParamsBuilder().
                Param("$sku").Text(sku).
                Param("$n").Int64(1).Build()),
        ); err != nil {
            return err
        }
        _, err := tx.Exec(ctx,
            "INSERT INTO reservations (request_id, sku) VALUES ($rid, $sku)",
            query.WithParameters(ydb.ParamsBuilder().
                Param("$rid").Text(reqID).
                Param("$sku").Text(sku).Build()),
            query.WithCommit(),
        )
        return err
    })
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-09` by ID.
      - Identify this as a non-interactive transaction
        (`db.Query().DoTx(...)`): the SDK manages begin and commit,
        the developer influences them via options. The closure
        already fuses commit into the last write via
        `query.WithCommit()` (RULE-GO-10 territory, addressed), but
        the begin is still a separate RPC because the driver was
        opened without `ydb.WithLazyTx(true)`.
      - Recommend opening the driver with `ydb.WithLazyTx(true)` (or
        passing `query.WithLazyTx(true)` as a per-`DoTx` option). With
        the lazy-tx flag, `DoTx` defers begin to the first query
        inside the closure — the begin then rides on the first
        `tx.Exec` RPC and the transaction takes two round-trips
        instead of three.
      - Frame the win in round-trip terms specifically (one fewer
        RPC per transaction), which matters at ~10k req/s.

      Full fail if the response:
      - Suggests rewriting to `s.BeginTransaction(...)` + `tx.Execute`
        (going back to interactive) instead of enabling lazy-tx on
        the DoTx path.
      - Treats the existing `query.WithCommit()` as the begin-side
        fix.
      - Misses the `ydb.WithLazyTx(true)` driver-option name entirely.
