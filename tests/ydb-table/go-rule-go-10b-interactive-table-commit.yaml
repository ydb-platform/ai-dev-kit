description: Go audit · Interactive Table Service `tx.CommitTx` as a separate RPC (RULE-GO-10)

vars:
  user_prompt: |
    Review this Go function. It runs on a high-frequency OLTP path and
    is one of our hottest call sites. Anything we can tune?

    ```go
    func transferFunds(ctx context.Context, db *ydb.Driver, fromID, toID uint64, amount int64) error {
        return db.Table().Do(ctx, func(ctx context.Context, s table.Session) error {
            tx, _, err := s.Execute(ctx,
                table.TxControl(table.BeginTx(table.WithSerializableReadWrite())),
                "UPDATE accounts SET balance = balance - $amt WHERE id = $from",
                table.NewQueryParameters(
                    table.ValueParam("$from", types.Uint64Value(fromID)),
                    table.ValueParam("$amt", types.Int64Value(amount)),
                ),
            )
            if err != nil { return err }
            _, err = tx.Execute(ctx,
                "UPDATE accounts SET balance = balance + $amt WHERE id = $to",
                table.NewQueryParameters(
                    table.ValueParam("$to", types.Uint64Value(toID)),
                    table.ValueParam("$amt", types.Int64Value(amount)),
                ),
            )
            if err != nil { return err }
            _, err = tx.CommitTx(ctx)
            return err
        })
    }
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-10` by ID.
      - Identify this as an interactive Table Service transaction
        (begin already correctly fused on the first `s.Execute` via
        `table.TxControl(table.BeginTx(...))`), and call out the
        trailing `tx.CommitTx(ctx)` as a standalone commit RPC.
      - Recommend passing `options.WithCommit()` (from
        `github.com/ydb-platform/ydb-go-sdk/v3/table/options`) as an
        `ExecuteDataQueryOption` on the *last* `tx.Execute(...)` and
        deleting the explicit `tx.CommitTx(ctx)` call. The commit
        then rides on that final write's RPC.
      - Make the round-trip arithmetic explicit: begin + write1 +
        write2 + commit = 4 RPCs becomes begin+write1 + write2(commit)
        = 2 RPCs (begin already fused via the first TxControl).

      Full fail if the response:
      - Recommends `query.WithCommit()` (Query Service ExecuteOption,
        wrong package — this is Table Service code).
      - Recommends rebuilding the whole transaction with
        `table.TxControl(table.BeginTx(...), table.CommitTx())` on
        the second `s.Execute` — that starts a fresh transaction and
        does not commit the one already opened on the first
        `s.Execute`.
      - Defends the explicit `tx.CommitTx` as needed for correctness.
