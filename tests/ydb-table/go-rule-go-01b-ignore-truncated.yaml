description: Go audit · `ydb.WithIgnoreTruncated` masking Table Service truncation (RULE-GO-01)

vars:
  user_prompt: |
    Our team kept hitting "result truncated" errors on this report
    query in production, so we silenced them at the driver. The error
    is gone; the dashboard still looks fine. Anything to worry about?

    ```go
    db, err := ydb.Open(ctx,
        "grpcs://ydb.example.internal:2135/?database=/prod/main",
        ydb.WithIgnoreTruncated(), // shuts up the "truncated" error
        ydb.WithCredentials(...),
    )
    // ...
    var totals []Total
    err = db.Table().Do(ctx, func(ctx context.Context, s table.Session) error {
        _, res, err := s.Execute(ctx, table.DefaultTxControl(),
            `SELECT customer_id, SUM(amount) AS total
             FROM usage_items WHERE billed = false
             GROUP BY customer_id`, nil)
        if err != nil {
            return err
        }
        defer res.Close()
        local := totals[:0]
        for res.NextResultSet(ctx) {
            for res.NextRow() {
                var t Total
                if err := res.ScanWithDefaults(&t.CustomerID, &t.Amount); err != nil {
                    return err
                }
                local = append(local, t)
            }
        }
        if err := res.Err(); err != nil { return err }
        totals = local
        return nil
    }, table.WithIdempotent())
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-GO-01` by ID.
      - Identify `ydb.WithIgnoreTruncated()` on the driver as the trap:
        it restores v2-style silent truncation where `s.Execute`
        returns `err == nil` with the first 1000 matching rows and
        everything beyond the cap dropped. The dashboard "looks fine"
        is consistent with silently under-counting / under-billing
        once production data crosses the cap.
      - Explain the architectural issue: the 1000-row cap is a design
        constraint, not a knob; the v3 error was the signal that the
        read assumption is wrong and code needs to paginate / move to
        the Query Service streaming path.
      - Recommend removing `WithIgnoreTruncated()` AND restructuring
        the read — keyset pagination (`WHERE customer_id > $cursor
        ORDER BY customer_id LIMIT N` wrapped in an outer loop until a
        page comes back empty) or `db.Query()` which streams without
        the row cap.

      Full fail if the response:
      - Endorses `WithIgnoreTruncated()` as a valid production setting.
      - Treats the issue as a logging / observability problem (silence
        the error, alert when truncated) rather than as silent data
        loss.
      - Recommends only raising `LIMIT` without an outer pagination
        loop.
