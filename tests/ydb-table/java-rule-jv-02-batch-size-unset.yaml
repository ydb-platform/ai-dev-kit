description: Java audit · JDBC batching not configured (RULE-JV-02)

vars:
  user_prompt: |
    Here is the `application.properties` for our Spring Boot service that
    writes a lot of rows into YDB via Hibernate. Anything wrong with it?

    ```properties
    spring.datasource.url=jdbc:ydb:grpc://localhost:2136/local
    spring.datasource.driver-class-name=tech.ydb.jdbc.YdbDriver
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=false
    ```

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Cite `RULE-JV-02` by ID (the rule about JDBC batching not configured).
      - Note that Hibernate's default JDBC batch size is 1, so every write is a separate round trip.
      - Recommend setting `spring.jpa.properties.hibernate.jdbc.batch_size` (with a value > 1; the rule recommends `1000` and we accept any value > 1 as long as the property name is correct).
      - Also recommend `spring.jpa.properties.hibernate.order_inserts=true` and `…order_updates=true` so batches can actually form.
      - Not invent additional Hibernate properties that don't exist.

      Full fail if the response says batching is already configured by default, or invents non-existent property names.
