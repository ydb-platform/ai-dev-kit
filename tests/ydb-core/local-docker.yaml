description: Core · Local Docker + Python quickstart

vars:
  user_prompt: |
    I want to run YDB locally on my Mac and try it from a Python script. What
    is the quickest path? Just give me the docker command and the connection
    snippet.

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Recommend the `ydbplatform/local-ydb` Docker image (the image name
        appears verbatim in the ydb-core skill).
      - Include `-h localhost` in the docker run command, OR an equivalent
        explanation of why that flag is needed when connecting from the host.
      - Use `grpc://localhost:2136` or `grpcs://localhost:2135` in the Python
        connection string — with `/local` as the default database.
      - Reference the `ydb` package from PyPI (the Python SDK).
      - Not invent flags that do not appear in the skill content (e.g. a
        non-existent `--init-db` flag or fabricated env vars).

      Partial credit if the snippet would work but skips `-h localhost`.
      Fail if the docker image name is wrong.
