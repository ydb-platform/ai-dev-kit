description: Core · Onboarding — 3-minute YDB intro for a newcomer

vars:
  user_prompt: |
    I've never used YDB before. Can you give me a quick 3-minute intro — what
    it is, what problems it solves, and which parts I'll interact with as a
    backend developer?

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Identify YDB as an open-source distributed SQL database.
      - Mention YQL as the query language (the primary developer-facing surface).
      - Mention at least one additional surface present in the skill (topics,
        coordination, or CDC) — not invent surfaces like "cache" or "vector".
      - Reference the official documentation at https://ydb.tech or a child URL.
      - Stay grounded: no fabricated feature lists (e.g. "supports MongoDB
        protocol", "has a graph engine") — the ydb-core skill does not mention
        those and they are not real features.

      Partial credit is fine. Flag any fabricated YDB features explicitly.
