description: Core · Cloud auth without hardcoded credentials

vars:
  user_prompt: |
    I'm running my service on a Yandex Cloud VM that connects to a managed
    YDB instance. How do I configure auth without putting a token in the
    container image or env file?

assert:
  - type: llm-rubric
    value: |
      The response should:
      - Recommend metadata-based credentials — either the `YDB_METADATA_CREDENTIALS=1`
        environment variable or the equivalent SDK helper
        (MetadataCredentials / FromMetadata / etc.).
      - Link to the canonical auth reference
        (https://ydb.tech/docs/en/reference/ydb-sdk/auth) OR describe it
        clearly enough that the user can find it.
      - Not recommend hardcoding a token in the container.
      - Not invent env-var names that are not in the skill's auth section
        (the real ones: YDB_ACCESS_TOKEN_CREDENTIALS, YDB_METADATA_CREDENTIALS,
        YDB_SERVICE_ACCOUNT_KEY_FILE_CREDENTIALS, YDB_ANONYMOUS_CREDENTIALS,
        YDB_OAUTH2_KEY_FILE, YDB_TOKEN, SA_KEY_FILE).

      Flag any invented env-var name as a failure.
