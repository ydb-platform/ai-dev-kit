# YDB skills compatibility matrix.
#
# Goal: for each (provider, model), measure how well our skills work when
# loaded into a coding-agent-style system prompt. Identifies the minimum
# model per vendor family that still passes most tests.
#
# Usage:
#   export OPENROUTER_API_KEY="..."
#   npx promptfoo@latest eval
#   npx promptfoo@latest view
#
# Every model is accessed through public OpenRouter via the generic `http`
# provider. OpenRouter speaks the OpenAI chat-completions shape, so we only
# need to extract `choices[0].message.content`.

description: YDB skills compatibility matrix

# Run knobs — bump concurrency to make full-matrix runs faster.
# OpenRouter handles parallelism; the limiter is your key's monthly cap.
# CLI override: `npx promptfoo eval -j <N>`.
evaluateOptions:
  maxConcurrency: 12


_http_base: &http
  method: POST
  url: "https://openrouter.ai/api/v1/chat/completions"
  headers:
    Content-Type: application/json
    Authorization: "Bearer {{ env.OPENROUTER_API_KEY }}"
  transformResponse: json.choices[0].message.content

_messages: &messages
  - role: system
    content: |
      You are a coding assistant helping a user work with YDB — an open-source
      distributed SQL database (https://ydb.tech). Domain-specific skills are
      installed; their full content follows. Use the skill whose scope matches
      the user's request. If no skill applies, answer from general knowledge
      but say so explicitly.

      Follow the content rules stated inside each skill — especially: do not
      invent YDB-specific details; cite rule IDs when auditing; prefer stating
      uncertainty over guessing. When the answer depends on a doc page the
      skill links to, quote the link rather than paraphrase from memory.

      Be concise. Answer in the minimum words and code the user actually needs
      — no "Great question!" openings, no recap of what the user asked, no
      closing "let me know if …" paragraphs, no marketing. Code snippets over
      prose when applicable. Aim for under 300 words unless the task genuinely
      needs more (e.g. a multi-file example).

      ══════════════════════════════════════════════════════════════════════════
      SKILL: ydb-core
      ══════════════════════════════════════════════════════════════════════════
      {{ ydb_core }}

      ══════════════════════════════════════════════════════════════════════════
      SKILL: ydb-table
      ══════════════════════════════════════════════════════════════════════════
      {{ ydb_table }}

      --- ydb-table / references / working-with-data.md ---
      {{ ydb_table_refs_working_with_data }}

      --- ydb-table / references / embed / java.md ---
      {{ ydb_table_refs_java }}

      --- ydb-table / rules / embed / java.md ---
      {{ ydb_table_rules_java }}

      --- ydb-table / rules / embed / go.md ---
      {{ ydb_table_rules_go }}
  - role: user
    content: "{{ user_prompt }}"

providers:
  # ── Frontier · closed (cloud-API customers) ────────────────────────────
  - id: https:anthropic/claude-opus-4.7
    label: Frontier · Anthropic Opus 4.7
    config:
      <<: *http
      body:
        model: "anthropic/claude-opus-4.7"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:openai/gpt-5.3-codex
    label: Frontier · OpenAI GPT-5.3 Codex
    config:
      <<: *http
      body:
        model: "openai/gpt-5.3-codex"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:google/gemini-3.1-pro-preview
    label: Frontier · Google Gemini 3.1 Pro (preview)
    config:
      <<: *http
      body:
        model: "google/gemini-3.1-pro-preview"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048

  # ── Frontier · open-source (enterprise on-prem inference) ──────────────
  - id: https:deepseek/deepseek-v4-pro
    label: Frontier OSS · DeepSeek v4-Pro
    config:
      <<: *http
      body:
        model: "deepseek/deepseek-v4-pro"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:moonshotai/kimi-k2.6
    label: Frontier OSS · Moonshot Kimi K2.6
    config:
      <<: *http
      body:
        model: "moonshotai/kimi-k2.6"
        reasoning: { enabled: false }
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:qwen/qwen3.6-plus
    label: Frontier OSS · Qwen3.6 Plus
    config:
      <<: *http
      body:
        model: "qwen/qwen3.6-plus"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048

  # ── Laptop · Ollama-runnable (dev workstation, 16–32 GB RAM) ───────────
  - id: https:openai/gpt-oss-20b
    label: Laptop · OpenAI gpt-oss-20b
    config:
      <<: *http
      body:
        model: "openai/gpt-oss-20b"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:mistralai/devstral-small
    label: Laptop · Mistral Devstral Small
    config:
      <<: *http
      body:
        model: "mistralai/devstral-small"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:qwen/qwen3.6-35b-a3b
    label: Laptop · Qwen3.6 35B-A3B
    config:
      <<: *http
      body:
        model: "qwen/qwen3.6-35b-a3b"
        messages: *messages
        temperature: 0.2
        # Reasoning model: 2048 was eaten by the thinking budget and
        # answers came back truncated mid-token. 8192 covers thinking
        # plus the final answer.
        max_tokens: 8192

# Single system-prompt template — see prompts/coding-agent.yaml.
# It embeds every installable skill's full SKILL.md body into the system
# message. Tests only supply the user-side {{user_prompt}}.
prompts:
  - "{{ user_prompt }}"

defaultTest:
  # Skill bodies are loaded once, available to every test. Editing a SKILL.md
  # automatically flows into the prompt on the next eval run.
  vars:
    ydb_core: file://skills/ydb-core/SKILL.md
    ydb_table: file://skills/ydb-table/SKILL.md
    ydb_table_refs_working_with_data: file://skills/ydb-table/references/working-with-data.md
    ydb_table_refs_java: file://skills/ydb-table/references/embed/java.md
    ydb_table_rules_java: file://skills/ydb-table/rules/embed/java.md
    ydb_table_rules_go: file://skills/ydb-table/rules/embed/go.md
  # Hard pre-filter: any output that came back as the defensive
  # "[provider error] ..." stub is a fail regardless of what the grader says.
  # Without this the grader will happily pass a 400/401 error as a "valid
  # refusal" response.
  assert:
    - type: not-contains
      value: "[provider error]"
  # Default rubric grader — one capable model judges every llm-rubric
  # assertion so grader quality is a fixed constant across the matrix.
  options:
    provider:
      id: https:anthropic/claude-sonnet-4.6-grader
      config:
        <<: *http
        # Grader receives the rendered rubricPrompt via promptfoo's `prompt`
        # var — NOT the test's user_prompt. We pass it as a single user turn.
        body:
          model: "anthropic/claude-sonnet-4.6"
          messages:
            - role: user
              content: "{{ prompt }}"
          temperature: 0.0
          max_tokens: 1024
    rubricPrompt: |
      Grade whether an AI assistant's response substantively addressed a
      user's YDB question and satisfied the rubric criteria.

      USER PROMPT:
      {{ user_prompt }}

      ASSISTANT RESPONSE:
      {{ output }}

      RUBRIC:
      {{ rubric }}

      Rules:
      - Generic "I'm ready to help" greetings, empty refusals, requests for
        clarification when the user already gave enough detail, or answers to
        a different question → FAIL.
      - Partial but substantive answers that miss a minor criterion → may PASS
        with score < 1.
      - A correct response must clearly attempt to satisfy the rubric's key
        criteria, grounded in the loaded skill content.

      Reply with ONE line — a single JSON object, no code fence, no prose:
      {"pass": true|false, "score": 0.0, "reason": "…"}

# Tests are discovered from tests/<skill>/*.yaml.
tests:
  - file://tests/ydb-core/*.yaml
  - file://tests/ydb-table/*.yaml
