# YDB skills compatibility matrix.
#
# Goal: for each (provider, model), measure how well our skills work when
# loaded into a coding-agent-style system prompt. Identifies the minimum
# model per vendor family that still passes most tests.
#
# Usage:
#   export OPENROUTER_API_BASE_URL="..."
#   export OPENROUTER_API_KEY="..."
#   npx promptfoo@latest eval
#   npx promptfoo@latest view
#
# Every model is accessed through an openrouter-style endpoint (OpenAI-
# compatible) using the generic `http` provider — needed because the endpoint
# wraps responses in an envelope {key, response: {...OpenAI-shape...}}, and
# promptfoo's built-in openai provider has no way to unwrap that. We pass
# json.response.choices[0].message.content to transformResponse to extract
# the assistant text from inside the envelope.

description: YDB skills compatibility matrix

# Common bits shared across every provider via YAML anchors / merge keys.
_http_headers: &headers
  Content-Type: application/json
  Authorization: "Bearer {{ env.OPENROUTER_API_KEY }}"

_http_base: &http
  method: POST
  url: "{{ env.OPENROUTER_API_BASE_URL }}/v1/chat/completions"
  headers: *headers
  # Unwraps the proxy envelope + captures tokenUsage. See transform-response.js
  # for the full contract. An external file avoids YAML-scalar parsing
  # quirks that broke inline IIFE expressions.
  transformResponse: file://transform-response.js

_messages: &messages
  - role: system
    content: |
      You are a coding assistant helping a user work with YDB — an open-source
      distributed SQL database (https://ydb.tech). Domain-specific skills are
      installed; their full content follows. Use the skill whose scope matches
      the user's request. If no skill applies, answer from general knowledge
      but say so explicitly.

      Follow the content rules stated inside each skill — especially: do not
      invent YDB-specific details; cite rule IDs when auditing; prefer stating
      uncertainty over guessing. When the answer depends on a doc page the
      skill links to, quote the link rather than paraphrase from memory.

      Be concise. Answer in the minimum words and code the user actually needs
      — no "Great question!" openings, no recap of what the user asked, no
      closing "let me know if …" paragraphs, no marketing. Code snippets over
      prose when applicable. Aim for under 300 words unless the task genuinely
      needs more (e.g. a multi-file example).

      ══════════════════════════════════════════════════════════════════════════
      SKILL: ydb-core
      ══════════════════════════════════════════════════════════════════════════
      {{ ydb_core }}

      ══════════════════════════════════════════════════════════════════════════
      SKILL: ydb-table
      ══════════════════════════════════════════════════════════════════════════
      {{ ydb_table }}

      --- ydb-table / references / bulk-write.md ---
      {{ ydb_table_refs_bulk_write }}

      --- ydb-table / references / transactions.md ---
      {{ ydb_table_refs_transactions }}

      --- ydb-table / references / embed / java.md ---
      {{ ydb_table_refs_java }}

      --- ydb-table / rules / embed / java.md ---
      {{ ydb_table_rules_java }}
  - role: user
    content: "{{ user_prompt }}"

providers:
  # ── Cloud baselines (one per vendor family) ────────────────────────────
  - id: https:anthropic/claude-sonnet-4.6
    label: Anthropic · Sonnet 4.6 (baseline)
    config:
      <<: *http
      body:
        model: "anthropic/claude-sonnet-4.6"
        messages: *messages
        temperature: 0.2
        max_tokens: 2048
  - id: https:google/gemini-2.5-pro
    label: Google · Gemini 2.5 Pro
    config:
      <<: *http
      body:
        model: "google/gemini-2.5-pro"
